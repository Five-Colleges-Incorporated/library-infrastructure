[commands."common.EOF"]
type = "tidy"
include = ["*"]
exclude = []
cmd = ["end-of-file-fixer"]
ok_exit_codes = [0, 1]
[commands."common.whitespace"]
type = "tidy"
include = ["*"]
exclude = []
cmd = ["trailing-whitespace-fixer", "--markdown-linebreak-ext=md"]
ok_exit_codes = [0, 1]
[commands."common.large-files"]
type = "lint"
include = ["*"]
cmd = ["check-added-large-files"]
ok_exit_codes = [0]
[commands."common.case"]
type = "lint"
include = ["*"]
cmd = ["check-case-conflict"]
ok_exit_codes = [0]

[commands."tofu.format"]
type = "both"
include = ["*.tofu"]
exclude = []
cmd = ["tofu", "fmt"]
lint_flags=["-check"]
ok_exit_codes = [0]
